<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Node Drawing</title>
<style>
  :root {
    --bg: #f2f3f7;
    --node-fill: #ffffff;
    --node-stroke: #2b3350;
    --label: #2b3350;
    --hint: #6b7288;
    --accent: #0077b6;
    --danger: #d61f69;
    --grab: #b8860b;
  }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: system-ui, sans-serif;
    /* app UI, nothing to select: stops iOS long-press text selection
       (e.g. on the Reset label) while dragging nodes */
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  #canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }
  .edge { stroke-width: 1.5; }
  .node .hit { fill: transparent; cursor: grab; }
  .node .dot {
    fill: var(--node-fill);
    stroke: var(--node-stroke);
    stroke-width: 1.5;
    pointer-events: none;
  }
  .node.dragging .hit { cursor: grabbing; }
  .node.dragging .dot { stroke: var(--grab); }
  .node text {
    fill: var(--label);
    font-size: 10px;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }
  #bar {
    position: fixed;
    top: 10px;
    left: 12px;
    right: 12px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 8px;
    pointer-events: none;
  }
  .btn {
    pointer-events: auto;
    background: var(--node-fill);
    color: var(--label);
    border: 1.5px solid var(--node-stroke);
    border-radius: 6px;
    font: inherit;
    font-size: 13px;
    padding: 4px 12px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  dialog {
    background: var(--node-fill);
    color: var(--label);
    border: 1.5px solid var(--node-stroke);
    border-radius: 10px;
    padding: 20px;
    width: min(360px, 90vw);
    box-sizing: border-box;
    font-family: inherit;
  }
  dialog::backdrop { background: rgba(0, 0, 0, 0.5); }
  dialog h2 { margin: 0 0 8px; font-size: 16px; }
  dialog h3 { margin: 16px 0 8px; font-size: 13px; }
  dialog p { margin: 0 0 12px; font-size: 13px; color: var(--hint); }
  dialog label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 13px;
    margin: 0 0 12px;
  }
  dialog output {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  dialog input[type="range"] {
    display: block;
    width: 100%;
    margin: 0 0 12px;
    accent-color: var(--accent);
  }
  dialog input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
  }
  dialog select {
    font: inherit;
    font-size: 13px;
    padding: 4px 6px;
    background: var(--bg);
    color: var(--label);
    border: 1.5px solid var(--node-stroke);
    border-radius: 6px;
    min-width: 0;
  }
  #layers {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 0 0 10px;
  }
  .layer-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .layer-row select { flex: 1; }
  .layer-swatch {
    flex: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid rgba(0, 0, 0, 0.25);
  }
  .layer-remove {
    flex: none;
    padding: 4px 9px;
    line-height: 1;
  }
  #add-layer { margin: 0 0 4px; }
  #pics {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 0 0 12px;
  }
  .pic-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .pic-row .pic-thumb { flex: none; width: 22px; height: 22px; }
  .pic-row .pic-name { flex: none; width: 56px; color: var(--hint); }
  .pic-row select { flex: 1; }
  #approximate {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  #approx-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-right: auto; /* controls left, tools right, wraps on mobile */
    pointer-events: none;
  }
  #approx-bar[hidden] { display: none; }
  #approx-bar .speed.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  dialog .actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
  }
  dialog button {
    font: inherit;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    color: var(--label);
    border: 1.5px solid var(--node-stroke);
    touch-action: manipulation;
  }
  dialog button:disabled { opacity: 0.4; cursor: default; }
  dialog button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #do-reset {
    background: var(--danger);
    color: #fff;
    border-color: var(--danger);
  }
  #link-preview svg {
    display: block;
    width: 100%;
    height: 180px;
    background: var(--bg);
    border: 1.5px solid var(--node-stroke);
    border-radius: 6px;
    box-sizing: border-box;
  }
  #load-link {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  #apply-settings {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
</style>
</head>
<body>
<div id="bar">
  <div id="approx-bar" hidden>
    <button id="approx-pause" class="btn" type="button">Pause</button>
    <button class="btn speed active" data-speed="slow" type="button">Slow</button>
    <button class="btn speed" data-speed="fast" type="button">Fast</button>
    <button class="btn speed" data-speed="max" type="button">Max</button>
  </div>
  <button id="share" class="btn" type="button">Share</button>
  <button id="download" class="btn" type="button">Download SVG</button>
  <button id="settings-btn" class="btn" type="button">Settings</button>
  <button id="reset" class="btn" type="button">Reset</button>
</div>
<dialog id="confirm-reset">
  <h2>Reset the layout?</h2>
  <p>All nodes move back to their starting positions on the circle. This can't be undone.</p>
  <div class="actions">
    <button id="cancel-reset" type="button">Cancel</button>
    <button id="do-reset" type="button">Reset</button>
  </div>
</dialog>
<dialog id="confirm-load">
  <h2>Load shared drawing?</h2>
  <p>This link holds a different drawing than the one saved on this device.</p>
  <div id="link-preview"></div>
  <div class="actions">
    <button id="keep-mine" type="button">Keep mine</button>
    <button id="load-link" type="button">Load</button>
  </div>
</dialog>
<dialog id="settings">
  <h2>Settings</h2>
  <label for="node-count">Number of nodes
    <output id="node-count-value">100</output>
  </label>
  <input type="range" id="node-count" min="10" max="200" step="1">
  <p>Changing the count resets the layout.</p>
  <h3>Layers</h3>
  <div id="layers"></div>
  <button id="add-layer" type="button">Add layer</button>
  <label>Connect first and last nodes
    <input type="checkbox" id="close-loop">
  </label>
  <h3>Pictures</h3>
  <div id="pics"></div>
  <input type="file" id="pic-file" accept="image/*" hidden>
  <button id="approximate" type="button">Approximate!</button>
  <div class="actions">
    <button id="cancel-settings" type="button">Cancel</button>
    <button id="apply-settings" type="button">Apply</button>
  </div>
</dialog>
<svg id="canvas">
  <g id="edges"></g>
  <g id="nodes"></g>
</svg>

  function validPic(p) {
    if (!p || typeof p !== 'object') return false;
    if (p.builtin) return Object.prototype.hasOwnProperty.call(BUILTIN_PICS, p.builtin);

      Array.isArray(p.points) && p.points.length >= 8 && p.points.length <= 2048 &&

  }

    return pic.builtin ? BUILTIN_PICS[pic.builtin].points : pic.points;
  }

  function picLabel(pic) {
    return pic.builtin ? BUILTIN_PICS[pic.builtin].label : pic.name;
  }

  // resample a closed polygon to n points by arc length

    for (let i = 0; i < points.length; i++) {
      const a = points[i], b = points[(i + 1) % points.length];
      per.push(total);
      total += Math.hypot(b[0] - a[0], b[1] - a[1]);
    }
    const out = [];
    let seg = 0;
    for (let k = 0; k < n; k++) {
      const target = (k / n) * total;
      while (seg < points.length - 1 && per[seg + 1] <= target) seg++;
      const a = points[seg], b = points[(seg + 1) % points.length];
      const len = Math.hypot(b[0] - a[0], b[1] - a[1]) || 1;
      const t = (target - per[seg]) / len;
      out.push([a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t]);
    }
    return out;
  }

  // Image -> outline contour extraction. This exact code is embedded in
  // index.html (extractContour) and reused by the offline generator.
  // Pipeline: rasterize to a small canvas, threshold (alpha if the image
  // has transparency, darkness otherwise), morphological closing (fuses
  // small gaps like a head above shoulders), boundary-edge cycle tracing
  // of the largest contour, arc-length resampling, normalization (max
  // dimension spans 0..1, aspect preserved).
  async function extractContour(imgSrc, gridSize, samples) {
    gridSize = gridSize || 200;
    samples = samples || 256;
    const img = await new Promise((resolve, reject) => {
      const el = new Image();
      el.onload = () => resolve(el);
      el.onerror = reject;
      el.src = imgSrc;
    });
    const scale = gridSize / Math.max(img.naturalWidth, img.naturalHeight);
    const w = Math.max(2, Math.round(img.naturalWidth * scale));
    const h = Math.max(2, Math.round(img.naturalHeight * scale));
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0, w, h);
    const data = ctx.getImageData(0, 0, w, h).data;

    let hasAlpha = false;
    for (let i = 3; i < data.length; i += 4) {
      if (data[i] < 250) { hasAlpha = true; break; }
    }
    let mask = new Uint8Array(w * h);
    for (let i = 0; i < w * h; i++) {
      const r = data[i * 4], g = data[i * 4 + 1], b = data[i * 4 + 2], a = data[i * 4 + 3];
      mask[i] = hasAlpha ? (a > 128 ? 1 : 0) : ((r + g + b) < 690 ? 1 : 0);
    }

    // morphological closing (box dilate then erode) to fuse nearby parts
    const rad = Math.max(2, Math.round(gridSize * 0.02));
    const morph = (src, isDilate) => {
      const out = new Uint8Array(w * h);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let val = isDilate ? 0 : 1;
          for (let dy = -rad; dy <= rad; dy++) {
            for (let dx = -rad; dx <= rad; dx++) {
              const nx = x + dx, ny = y + dy;
              const v = nx >= 0 && nx < w && ny >= 0 && ny < h ? src[ny * w + nx] : 0;
              if (isDilate && v) { val = 1; dy = dx = rad + 1; }
              if (!isDilate && !v) { val = 0; dy = dx = rad + 1; }
            }
          }
          out[y * w + x] = val;
        }
      }
      return out;
    };
    mask = morph(morph(mask, true), false);

    // Directed boundary edges of solid pixels, oriented so they always
    // form closed cycles: top side right-to-left, bottom left-to-right,
    // left side downwards, right side upwards. Walk the longest cycle.
    const solid = (x, y) => (x >= 0 && x < w && y >= 0 && y < h ? mask[y * w + x] : 0);
    const key = (x, y) => y * (w + 1) + x;
    const edgesFrom = new Map(); // start vertex -> [end vertices]
    const addEdge = (x1, y1, x2, y2) => {
      const k = key(x1, y1);
      if (!edgesFrom.has(k)) edgesFrom.set(k, []);
      edgesFrom.get(k).push(key(x2, y2));
    };
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        if (!mask[y * w + x]) continue;
        if (!solid(x, y - 1)) addEdge(x + 1, y, x, y);
        if (!solid(x, y + 1)) addEdge(x, y + 1, x + 1, y + 1);
        if (!solid(x - 1, y)) addEdge(x, y, x, y + 1);
        if (!solid(x + 1, y)) addEdge(x + 1, y + 1, x + 1, y);
      }
    }
    let best = null;
    for (const [startKey] of edgesFrom) {
      while (edgesFrom.get(startKey) && edgesFrom.get(startKey).length) {
        const cycle = [];
        let k = startKey;
        while (true) {
          const outs = edgesFrom.get(k);
          if (!outs || !outs.length) break;
          cycle.push(k);
          k = outs.pop();
          if (k === startKey) break;
        }
        if (!best || cycle.length > best.length) best = cycle;
      }
    }
    if (!best || best.length < 8) return null;
    const pts = best.map(k => [k % (w + 1), Math.floor(k / (w + 1))]);

    // resample by arc length to a fixed count
    const per = [];
    let total = 0;
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i], b = pts[(i + 1) % pts.length];
      per.push(total);
      total += Math.hypot(b[0] - a[0], b[1] - a[1]);
    }
    const res = [];
    let seg = 0;
    for (let k = 0; k < samples; k++) {
      const target = (k / samples) * total;
      while (seg < pts.length - 1 && per[seg + 1] <= target) seg++;
      const a = pts[seg], b = pts[(seg + 1) % pts.length];
      const segLen = Math.hypot(b[0] - a[0], b[1] - a[1]) || 1;
      const t = (target - per[seg]) / segLen;
      res.push([a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t]);
    }

    // normalize: max dimension spans 0..1, aspect preserved
    const xs = res.map(p => p[0]), ys = res.map(p => p[1]);
    const minX = Math.min(...xs), minY = Math.min(...ys);
    const span = Math.max(Math.max(...xs) - minX, Math.max(...ys) - minY) || 1;
    return res.map(p => [
      Math.round((p[0] - minX) / span * 1000) / 1000,
      Math.round((p[1] - minY) / span * 1000) / 1000,
    ]);
  }

  const DEFAULT_LAYERS = [
    { type: 'all', color: 'black', pic: { builtin: 'tiger' } },
    { type: 'even', color: 'red', pic: { builtin: 'woman' } },
    { type: 'prime', color: 'blue' },
  ];
  let layers = DEFAULT_LAYERS.map(l => ({ ...l }));
  let closeLoop = false; // connect each chain's last member back to its first

  function validLayers(arr) {
    return Array.isArray(arr) &&
      arr.length >= 1 && arr.length <= MAX_LAYERS &&
      arr.every(l => l && typeof l === 'object' &&
        Object.prototype.hasOwnProperty.call(TYPES, l.type) &&
        Object.prototype.hasOwnProperty.call(PRESETS, l.color));
  }

  const SVGNS = 'http://www.w3.org/2000/svg';

  function make(tag, attrs) {
    const el = document.createElementNS(SVGNS, tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function rebuildEdges() {
    edges.length = 0;
    edgesLayer.textContent = '';
    layers.forEach((layer, li) => {
      const members = [];
      for (let i = 0; i < N; i++) {
        if (TYPES[layer.type].member(i + 1)) members.push(i);
      }
      // consecutive members; optionally close the chain into a ring
      // (skipped below 3 members — the wrap edge would just double up)
      const wrap = closeLoop && members.length > 2 ? 1 : 0;
      for (let k = 0; k < members.length - 1 + wrap; k++) {
        const line = make('line', {
          class: 'edge',
          stroke: PRESETS[layer.color],
          'data-layer': li,
        });
        edgesLayer.appendChild(line);
        edges.push({ a: members[k], b: members[(k + 1) % members.length], line });
      }
    });
    updateEdgePositions();
  }

  function updateEdgePositions() {
    for (const e of edges) {
      e.line.setAttribute('x1', nodes[e.a].x);
      e.line.setAttribute('y1', nodes[e.a].y);
      e.line.setAttribute('x2', nodes[e.b].x);
      e.line.setAttribute('y2', nodes[e.b].y);
    }
  }

  function buildGraph(n) {
    N = n;
    nodes.length = 0;
    nodesLayer.textContent = '';

    for (let i = 0; i < N; i++) nodes.push({ x: 0, y: 0 });

    nodes.forEach((node, i) => {
      const g = make('g', { class: 'node' });
      const hit = make('circle', { class: 'hit', r: HIT_R });
      const dot = make('circle', { class: 'dot', r: NODE_R });
      const label = make('text', {});
      label.textContent = i + 1;
      g.appendChild(hit);
      g.appendChild(dot);
      g.appendChild(label);
      g.dataset.index = i;
      nodesLayer.appendChild(g);
      node.g = g;
    });
    rebuildEdges();
  }

  function layoutCircle() {
    const rect = svg.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const radius = Math.min(rect.width, rect.height) / 2 - 40;
    for (let i = 0; i < N; i++) {
      const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
      nodes[i].x = cx + radius * Math.cos(angle);
      nodes[i].y = cy + radius * Math.sin(angle);
    }
  }

  function updateNode(i) {
    const n = nodes[i];
    n.g.setAttribute('transform', `translate(${n.x}, ${n.y})`);
  }

  function updateEdgesFor(i) {
    for (const e of edges) {
      if (e.a === i || e.b === i) {
        e.line.setAttribute('x1', nodes[e.a].x);
        e.line.setAttribute('y1', nodes[e.a].y);
        e.line.setAttribute('x2', nodes[e.b].x);
        e.line.setAttribute('y2', nodes[e.b].y);
      }
    }
  }

  function redrawAll() {
    for (let i = 0; i < N; i++) updateNode(i);
    updateEdgePositions();
  }

  // ---- State serialization (localStorage and share links) ----
  function statePositions() {
    return nodes.map(n => [Math.round(n.x * 10) / 10, Math.round(n.y * 10) / 10]);
  }

  function validPositions(arr) {
    return Array.isArray(arr) &&
      arr.length >= MIN_NODES && arr.length <= MAX_NODES &&
      arr.every(p => Array.isArray(p) && Number.isFinite(p[0]) && Number.isFinite(p[1]));
  }

  function applyPositions(arr) {
    buildGraph(arr.length);
    arr.forEach((p, i) => { nodes[i].x = p[0]; nodes[i].y = p[1]; });
  }

  // Share format v3: an un-encoded version digit, then base64url binary:
  //   byte 0: node count, byte 1: layer count L,
  //   L bytes: type index (high nibble) | color index (low nibble),
  //   then per node: x, y as little-endian int16 fixed-point (value * 10).
  // Legacy v1 (base64 JSON positions array) and v2 (base64 JSON {p, l})
  // never start with a digit ("[[" -> "W1s", "{\"p\"" -> "eyJ") and must
  // keep decoding forever.
  // Frozen index orders — append only, never reorder or remove:
  const TYPE_IDS = ['all', 'even', 'odd', 'prime', 'mult3', 'mult4', 'mult5'];
  const COLOR_IDS = ['black', 'red', 'blue', 'green', 'orange',
    'purple', 'teal', 'pink', 'yellow', 'gray'];

  function bytesToB64url(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  function b64urlToBytes(str) {
    let s = str.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    const bin = atob(s);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  // v4 stores coordinates as successive deltas (first one absolute) and
  // deflates the body — deltas on circle-ish layouts are smooth, which is
  // what makes deflate worthwhile; absolute int16s don't compress at all.
  // Deltas may wrap mod 2^16; since originals fit int16, decode is exact.
  function stateBytes(delta) {
    const dv = new DataView(new ArrayBuffer(2 + layers.length + 4 * N));
    dv.setUint8(0, N);
    // low bits: layer count; bit 7: close-the-loop flag (0 in old links)
    dv.setUint8(1, layers.length | (closeLoop ? 0x80 : 0));
    layers.forEach((l, i) => {
      dv.setUint8(2 + i, (TYPE_IDS.indexOf(l.type) << 4) | COLOR_IDS.indexOf(l.color));
    });
    const fixed = v => Math.max(-32768, Math.min(32767, Math.round(v * 10)));
    let o = 2 + layers.length, px = 0, py = 0;
    for (const n of nodes) {
      const x = fixed(n.x), y = fixed(n.y);
      dv.setInt16(o, delta ? x - px : x, true); // setInt16 wraps mod 2^16
      dv.setInt16(o + 2, delta ? y - py : y, true);
      if (delta) { px = x; py = y; }
      o += 4;
    }
    return new Uint8Array(dv.buffer);
  }

  function parseStateBytes(bytes, delta) {
    if (bytes.length < 3) return null;
    const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
    const n = dv.getUint8(0);
    const lc = dv.getUint8(1) & 0x7f;
    const closed = (dv.getUint8(1) & 0x80) !== 0;
    if (n < MIN_NODES || n > MAX_NODES || lc < 1 || lc > MAX_LAYERS) return null;
    if (bytes.length !== 2 + lc + 4 * n) return null;
    const l = [];
    for (let i = 0; i < lc; i++) {
      const b = dv.getUint8(2 + i);
      const type = TYPE_IDS[b >> 4], color = COLOR_IDS[b & 15];
      if (!type || !color) return null;
      l.push({ type, color });
    }
    const p = [];
    let o = 2 + lc, px = 0, py = 0;
    for (let i = 0; i < n; i++) {
      let x = dv.getInt16(o, true), y = dv.getInt16(o + 2, true);
      if (delta) {
        x = ((px + x) << 16) >> 16; // undo the mod-2^16 wrap
        y = ((py + y) << 16) >> 16;
        px = x; py = y;
      }
      p.push([x / 10, y / 10]);
      o += 4;
    }
    return { p, l, closed };
  }

  async function deflateBytes(bytes) {
    const stream = new Blob([bytes]).stream()
      .pipeThrough(new CompressionStream('deflate-raw'));
    return new Uint8Array(await new Response(stream).arrayBuffer());
  }

  async function inflateBytes(bytes) {
    const stream = new Blob([bytes]).stream()
      .pipeThrough(new DecompressionStream('deflate-raw'));
    return new Uint8Array(await new Response(stream).arrayBuffer());
  }

  async function encodeState() {
    const v3 = '3' + bytesToB64url(stateBytes(false));
    if (typeof CompressionStream === 'undefined') return v3;
    try {
      const v4 = '4' + bytesToB64url(await deflateBytes(stateBytes(true)));
      return v4.length < v3.length ? v4 : v3; // random layouts can inflate
    } catch (e) {
      return v3;
    }
  }

  async function decodeState(str) {
    if (/^[0-9]/.test(str)) {
      try {
        if (str[0] === '3') return parseStateBytes(b64urlToBytes(str.slice(1)), false);
        if (str[0] === '4' && typeof DecompressionStream !== 'undefined') {
          return parseStateBytes(await inflateBytes(b64urlToBytes(str.slice(1))), true);
        }
      } catch (e) {
        return null;
      }
      return null; // a future version this build doesn't understand
    }
    // legacy base64-JSON formats
    try {
      const data = JSON.parse(atob(str));
      if (validPositions(data)) return { p: data, l: null }; // v1
      if (data && validPositions(data.p)) { // v2
        return { p: data.p, l: validLayers(data.l) ? data.l : null };
      }
      return null;
    } catch (e) {
      return null;
    }
  }

  // ---- Persistence ----
  const STORAGE_KEY = 'node-drawing-positions-v1';
  const LAYERS_KEY = 'node-drawing-layers-v1';
  const LOOP_KEY = 'node-drawing-closeloop-v1';

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(statePositions()));
    } catch (e) { /* storage unavailable (private mode, quota) — skip */ }
  }

  function saveLayers() {
    try {
      localStorage.setItem(LAYERS_KEY, JSON.stringify(layers));
      localStorage.setItem(LOOP_KEY, closeLoop ? '1' : '0');
    } catch (e) { /* ignore */ }
  }

  function clearSavedState() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
  }

  function loadStoredPositions() {
    try {
      const arr = JSON.parse(localStorage.getItem(STORAGE_KEY));
      return validPositions(arr) ? arr : null;
    } catch (e) {
      return null;
    }
  }

  function loadStoredLayers() {
    try {
      const arr = JSON.parse(localStorage.getItem(LAYERS_KEY));
      if (!validLayers(arr)) return null;
      return arr.map(l => {
        const clean = { type: l.type, color: l.color };
        if (validPic(l.pic)) clean.pic = l.pic;
        return clean;
      });
    } catch (e) {
      return null;
    }
  }

  // Keep the URL hash mirroring the current state so the address bar is
  // always shareable. Debounced to 500ms: Safari throttles history
  // updates to ~100 per 30s, and a failed replaceState must never break
  // the app — the next change simply tries again.
  let hashTimer = null;
  let hashGen = 0;
  function scheduleHashUpdate() {
    clearTimeout(hashTimer);
    const gen = ++hashGen;
    hashTimer = setTimeout(async () => {
      const encoded = await encodeState();
      if (gen !== hashGen) return; // superseded while encoding
      try {
        history.replaceState(null, '', '#' + encoded);
      } catch (e) { /* history API throttled */ }
    }, 500);
  }

  // ---- Opening a link that differs from the saved drawing: preview + ask ----
  function sameState(h, storedP) {
    if (h.p.length !== storedP.length) return false;
    for (let i = 0; i < h.p.length; i++) {
      if (Math.abs(h.p[i][0] - storedP[i][0]) > 0.11 ||
          Math.abs(h.p[i][1] - storedP[i][1]) > 0.11) return false;
    }
    if (h.l && JSON.stringify(h.l) !== JSON.stringify(layers)) return false;
    if (typeof h.closed === 'boolean' && h.closed !== closeLoop) return false;
    return true;
  }

  function renderPreview(state) {
    const box = document.getElementById('link-preview');
    box.textContent = '';
    const pl = state.l || layers;
    const closed = typeof state.closed === 'boolean' ? state.closed : closeLoop;
    const xs = state.p.map(p => p[0]), ys = state.p.map(p => p[1]);
    const pad = 30;
    const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
    const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
    const preview = make('svg', {
      viewBox: `${minX} ${minY} ${maxX - minX} ${maxY - minY}`,
      preserveAspectRatio: 'xMidYMid meet',
    });
    pl.forEach(layer => {
      const members = [];
      for (let i = 0; i < state.p.length; i++) {
        if (TYPES[layer.type].member(i + 1)) members.push(i);
      }
      const wrap = closed && members.length > 2 ? 1 : 0;
      for (let k = 0; k < members.length - 1 + wrap; k++) {
        const a = state.p[members[k]], b = state.p[members[(k + 1) % members.length]];
        preview.appendChild(make('line', {
          x1: a[0], y1: a[1], x2: b[0], y2: b[1],
          stroke: PRESETS[layer.color],
          'stroke-width': 1,
          'vector-effect': 'non-scaling-stroke',
        }));
      }
    });
    const r = Math.max(maxX - minX, maxY - minY) / 130;
    for (const p of state.p) {
      preview.appendChild(make('circle', { cx: p[0], cy: p[1], r }));
    }
    box.appendChild(preview);
  }

  function applyHashState(h) {
    if (h.l) layers = h.l;
    if (typeof h.closed === 'boolean') closeLoop = h.closed;
    applyPositions(h.p);
    redrawAll();
  }

  function promptLoadLink(h) {
    const dialog = document.getElementById('confirm-load');
    renderPreview(h);
    const keep = () => {
      dialog.close();
      scheduleHashUpdate(); // URL now holds MY drawing; no re-ask on reload
    };
    document.getElementById('load-link').addEventListener('click', () => {
      dialog.close();
      applyHashState(h);
      saveState(); // remember the choice: no re-prompt on reload
      saveLayers();
    });
    document.getElementById('keep-mine').addEventListener('click', keep);
    dialog.addEventListener('cancel', keep); // Escape = keep mine
    dialog.showModal();
  }

  // ---- Initial state: shared link beats saved state beats defaults,
  //      but a link differing from the saved drawing asks first ----
  const fromHash = location.hash.length > 1 ? await decodeState(location.hash.slice(1)) : null;
  const storedLayers = loadStoredLayers();
  if (storedLayers) layers = storedLayers;
  try { closeLoop = localStorage.getItem(LOOP_KEY) === '1'; } catch (e) { /* ignore */ }
  const storedPositions = loadStoredPositions();
  if (fromHash && storedPositions && !sameState(fromHash, storedPositions)) {
    applyPositions(storedPositions);
    redrawAll();
    promptLoadLink(fromHash);
  } else if (fromHash) {
    applyHashState(fromHash);
  } else if (storedPositions) {
    applyPositions(storedPositions);
    redrawAll();
  } else {
    buildGraph(DEFAULT_NODES);
    layoutCircle();
    redrawAll();
  }

  // ---- Top bar buttons ----
  function flashLabel(btn, text) {
    const original = btn.dataset.label || (btn.dataset.label = btn.textContent);
    btn.textContent = text;
    clearTimeout(btn._flashTimer);
    btn._flashTimer = setTimeout(() => { btn.textContent = original; }, 1500);
  }

  const shareBtn = document.getElementById('share');
  shareBtn.addEventListener('click', async () => {
    location.hash = await encodeState();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(location.href)
        .then(() => flashLabel(shareBtn, 'Link copied!'))
        .catch(() => flashLabel(shareBtn, 'Link in URL bar'));
    } else {
      flashLabel(shareBtn, 'Link in URL bar');
    }
  });

  document.getElementById('download').addEventListener('click', () => {
    const rect = svg.getBoundingClientRect();
    const css = getComputedStyle(document.documentElement);
    const v = name => css.getPropertyValue(name).trim();

    const clone = svg.cloneNode(true);
    clone.removeAttribute('id');
    clone.setAttribute('xmlns', SVGNS);
    clone.setAttribute('width', rect.width);
    clone.setAttribute('height', rect.height);
    clone.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);

    // The page stylesheet doesn't travel with the file: inline the styles
    // (edge colors are already stroke attributes on the lines)
    const style = make('style', {});
    style.textContent =
      `.edge{stroke-width:1.5}` +
      `.hit{fill:none}` +
      `.dot{fill:${v('--node-fill')};stroke:${v('--node-stroke')};stroke-width:1.5}` +
      `text{fill:${v('--label')};font-size:10px;text-anchor:middle;` +
      `dominant-baseline:central;font-family:system-ui,sans-serif}`;
    const bg = make('rect', { width: rect.width, height: rect.height, fill: v('--bg') });
    clone.insertBefore(bg, clone.firstChild);
    clone.insertBefore(style, clone.firstChild);

    const blob = new Blob([new XMLSerializer().serializeToString(clone)],
      { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'node-drawing.svg';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });

  // ---- Reset (with confirmation) and settings ----
  const confirmDialog = document.getElementById('confirm-reset');
  const settingsDialog = document.getElementById('settings');
  const nodeCountInput = document.getElementById('node-count');
  const nodeCountValue = document.getElementById('node-count-value');
  const layersBox = document.getElementById('layers');
  const addLayerBtn = document.getElementById('add-layer');
  const closeLoopInput = document.getElementById('close-loop');
  let pendingCount = 0; // node count awaiting reset confirmation
  let workingLayers = []; // layer config being edited in the dialog

  nodeCountInput.addEventListener('input', () => {
    nodeCountValue.textContent = nodeCountInput.value;
  });

  function makeSelect(options, value, className) {
    const sel = document.createElement('select');
    sel.className = className;
    for (const [key, label] of options) {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = label;
      sel.appendChild(opt);
    }
    sel.value = value;
    return sel;
  }

  function renderLayerRows() {
    layersBox.textContent = '';
    workingLayers.forEach((layer, idx) => {
      const row = document.createElement('div');
      row.className = 'layer-row';

      const swatch = document.createElement('span');
      swatch.className = 'layer-swatch';
      swatch.style.background = PRESETS[layer.color];

      const typeSel = makeSelect(
        Object.entries(TYPES).map(([k, t]) => [k, t.label]),
        layer.type, 'layer-type');
      typeSel.addEventListener('change', () => { layer.type = typeSel.value; });

      const colorSel = makeSelect(
        Object.keys(PRESETS).map(k => [k, k[0].toUpperCase() + k.slice(1)]),
        layer.color, 'layer-color');
      colorSel.addEventListener('change', () => {
        layer.color = colorSel.value;
        swatch.style.background = PRESETS[layer.color];
        renderPicRows(); // thumbnails carry the layer color
      });

      const remove = document.createElement('button');
      remove.type = 'button';
      remove.className = 'layer-remove';
      remove.textContent = '✕';
      remove.setAttribute('aria-label', `Remove layer ${idx + 1}`);
      remove.disabled = workingLayers.length <= 1;
      remove.addEventListener('click', () => {
        workingLayers.splice(idx, 1);
        renderLayerRows();
      });

      row.appendChild(swatch);
      row.appendChild(typeSel);
      row.appendChild(colorSel);
      row.appendChild(remove);
      layersBox.appendChild(row);
    });
    addLayerBtn.disabled = workingLayers.length >= MAX_LAYERS;
    renderPicRows();
  }

  // ---- Per-layer pictures ----
  const picsBox = document.getElementById('pics');
  const picFileInput = document.getElementById('pic-file');
  let uploadTarget = -1; // layer index awaiting a file pick

  function renderPicRows() {
    picsBox.textContent = '';
    workingLayers.forEach((layer, idx) => {
      const row = document.createElement('div');
      row.className = 'pic-row';

      const thumb = make('svg', {
        class: 'pic-thumb',
        viewBox: '-0.05 -0.05 1.1 1.1',
        preserveAspectRatio: 'xMidYMid meet',
      });
      if (layer.pic) {
        thumb.appendChild(make('polygon', {
          points: picPoints(layer.pic).map(p => p.join(',')).join(' '),
          fill: PRESETS[layer.color],
        }));
      }

      const name = document.createElement('span');
      name.className = 'pic-name';
      name.textContent = `Layer ${idx + 1}`;

      const sel = document.createElement('select');
      const options = [['none', 'No picture'], ['tiger', 'Tiger'], ['woman', 'Woman']];
      if (layer.pic && !layer.pic.builtin) options.push(['custom', layer.pic.name]);
      options.push(['upload', 'Upload image…']);
      for (const [v, label] of options) {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = label;
        sel.appendChild(opt);
      }
      sel.value = layer.pic ? (layer.pic.builtin || 'custom') : 'none';
      sel.addEventListener('change', () => {
        if (sel.value === 'upload') {
          uploadTarget = idx;
          picFileInput.click();
          sel.value = layer.pic ? (layer.pic.builtin || 'custom') : 'none';
        } else if (sel.value === 'none') {
          delete layer.pic;
          renderPicRows();
        } else if (sel.value !== 'custom') {
          layer.pic = { builtin: sel.value };
          renderPicRows();
        }
      });

      row.appendChild(thumb);
      row.appendChild(name);
      row.appendChild(sel);
      picsBox.appendChild(row);
    });
    approximateBtn.disabled = !workingLayers.some(l => l.pic);
  }

  picFileInput.addEventListener('change', async () => {
    const file = picFileInput.files[0];
    picFileInput.value = '';
    if (!file || uploadTarget < 0 || uploadTarget >= workingLayers.length) return;
    try {
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
      const points = await extractContour(dataUrl, 200, 256);
      if (points) {
        workingLayers[uploadTarget].pic = { name: file.name, points };
        renderPicRows();
      }
    } catch (e) { /* undecodable image — leave the picture unchanged */ }
  });

  addLayerBtn.addEventListener('click', () => {
    if (workingLayers.length >= MAX_LAYERS) return;
    const used = new Set(workingLayers.map(l => l.color));
    const color = Object.keys(PRESETS).find(c => !used.has(c)) || 'gray';
    workingLayers.push({ type: 'all', color });
    renderLayerRows();
  });

  document.getElementById('reset').addEventListener('click', () => {
    pendingCount = 0;
    confirmDialog.showModal();
  });
  document.getElementById('cancel-reset').addEventListener('click', () => {
    pendingCount = 0;
    confirmDialog.close();
  });
  document.getElementById('do-reset').addEventListener('click', () => {
    confirmDialog.close();
    stopApprox();
    clearSavedState();
    if (pendingCount) {
      buildGraph(pendingCount);
      pendingCount = 0;
    }
    layoutCircle();
    redrawAll();
    scheduleHashUpdate(); // keeps a custom node count reload-safe too
  });

  document.getElementById('settings-btn').addEventListener('click', () => {
    stopApprox(); // editing settings cancels a running approximation
    nodeCountInput.value = N;
    nodeCountValue.textContent = N;
    workingLayers = layers.map(l => ({ ...l }));
    renderLayerRows();
    closeLoopInput.checked = closeLoop;
    settingsDialog.showModal();
  });
  document.getElementById('cancel-settings').addEventListener('click', () => {
    settingsDialog.close();
  });
  document.getElementById('apply-settings').addEventListener('click', () => {
    settingsDialog.close();

    // Layer and ring changes only redraw edges, so they apply without a reset
    layers = workingLayers.map(l => ({ ...l }));
    closeLoop = closeLoopInput.checked;
    saveLayers();
    rebuildEdges();
    scheduleHashUpdate();

    const raw = parseInt(nodeCountInput.value, 10);
    if (!Number.isFinite(raw)) return;
    const count = Math.max(MIN_NODES, Math.min(MAX_NODES, raw));
    if (count === N) return;
    pendingCount = count;
    confirmDialog.showModal();
  });

  // ---- Approximate: walk nodes toward per-layer silhouette targets ----
  const approxBar = document.getElementById('approx-bar');
  const approxPauseBtn = document.getElementById('approx-pause');
  const approximateBtn = document.getElementById('approximate');
  const approx = { running: false, paused: false, speed: 'slow', gen: 0 };
  const SPEED_DELAYS = { slow: 200, fast: 50 };

  function computeTargets() {
    const pictured = [];
    layers.forEach((l, i) => { if (l.pic && validPic(l.pic)) pictured.push(i); });
    if (!pictured.length) return null;
    // each node follows the picture of the LAST pictured layer containing
    // it, so overlapping memberships (all vs even) don't fight each other
    const controller = new Array(N).fill(-1);
    for (const li of pictured) {
      for (let i = 0; i < N; i++) {
        if (TYPES[layers[li].type].member(i + 1)) controller[i] = li;
      }
    }
    // pictures sit side by side in equal-width slots below the toolbar
    const rect = svg.getBoundingClientRect();
    const top = 56, pad = 24;
    const slotW = (rect.width - pad * 2) / pictured.length;
    const slotH = rect.height - top - pad * 2;
    const targets = new Array(N).fill(null);
    pictured.forEach((li, slot) => {
      const members = [];
      for (let i = 0; i < N; i++) if (controller[i] === li) members.push(i);
      if (!members.length) return;
      const pts = picPoints(layers[li].pic);
      const w = Math.max(...pts.map(p => p[0]));
      const h = Math.max(...pts.map(p => p[1]));
      const scale = Math.min((slotW * 0.9) / (w || 1), slotH / (h || 1));
      const ox = pad + slotW * slot + (slotW - w * scale) / 2;
      const oy = top + pad + (slotH - h * scale) / 2;
      const sampled = resamplePoints(pts, members.length);
      // align contours across pictures: start at the topmost point and
      // wind the same way, so chains that alternate between two shapes
      // (like all-nodes vs evens) sweep both outlines in sync instead
      // of criss-crossing the whole canvas
      let start = 0;
      let area = 0;
      for (let k = 0; k < sampled.length; k++) {
        if (sampled[k][1] < sampled[start][1]) start = k;
        const a = sampled[k], b = sampled[(k + 1) % sampled.length];
        area += a[0] * b[1] - b[0] * a[1];
      }
      const n = sampled.length;
      const oriented = sampled.map((_, k) =>
        sampled[(start + (area < 0 ? n - k : k)) % n]);
      members.forEach((idx, k) => {
        targets[idx] = [ox + oriented[k][0] * scale, oy + oriented[k][1] * scale];
      });
    });
    return targets;
  }

  function stopApprox() {
    approx.running = false;
    approx.gen++;
    approxBar.hidden = true;
  }

  async function startApprox() {
    stopApprox();
    const targets = computeTargets();
    if (!targets) return;
    layoutCircle(); // start from a clean reset, as advertised
    redrawAll();
    approx.running = true;
    approx.paused = false;
    approxPauseBtn.textContent = 'Pause';
    approxBar.hidden = false;
    const gen = approx.gen;
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    const ALPHA = 0.2; // fraction of the remaining distance per step
    let noiseMag = 8; // px of random wander, decaying per iteration
    let iter = 0;
    let maxMove = Infinity;
    window.__approx = { done: false, iter, maxMove }; // observability for tests

    let batchStart = performance.now();
    while (gen === approx.gen) {
      while (approx.paused && gen === approx.gen) await sleep(100);
      if (gen !== approx.gen) return;

      maxMove = 0;
      for (let i = 0; i < N; i++) {
        const t = targets[i];
        if (!t) continue;
        const ang = Math.random() * 2 * Math.PI;
        const mag = Math.random() * noiseMag;
        const mx = ALPHA * (t[0] - nodes[i].x) + Math.cos(ang) * mag;
        const my = ALPHA * (t[1] - nodes[i].y) + Math.sin(ang) * mag;
        nodes[i].x += mx;
        nodes[i].y += my;
        maxMove = Math.max(maxMove, Math.hypot(mx, my));
      }
      noiseMag *= 0.97;
      iter++;
      redrawAll();
      window.__approx = { done: false, iter, maxMove };

      if (maxMove < 1) break; // every node moved less than 1px: converged

      if (approx.speed === 'max') {
        // flat out, but yield 100ms every second so the page can paint
        if (performance.now() - batchStart >= 1000) {
          await sleep(100);
          batchStart = performance.now();
        }
      } else {
        await sleep(SPEED_DELAYS[approx.speed]);
        batchStart = performance.now();
      }
    }
    if (gen !== approx.gen) return;
    window.__approx = { done: true, iter, maxMove };
    stopApprox();
    saveState();
    scheduleHashUpdate();
  }

  approxPauseBtn.addEventListener('click', () => {
    approx.paused = !approx.paused;
    approxPauseBtn.textContent = approx.paused ? 'Resume' : 'Pause';
  });
  for (const btn of document.querySelectorAll('#approx-bar .speed')) {
    btn.addEventListener('click', () => {
      approx.speed = btn.dataset.speed;
      document.querySelectorAll('#approx-bar .speed').forEach(b =>
        b.classList.toggle('active', b === btn));
    });
  }

  approximateBtn.addEventListener('click', () => {
    settingsDialog.close();
    // commit the dialog's settings; the node count applies without the
    // usual warning because approximation starts with a reset anyway
    layers = workingLayers.map(l => ({ ...l }));
    closeLoop = closeLoopInput.checked;
    saveLayers();
    const raw = parseInt(nodeCountInput.value, 10);
    if (Number.isFinite(raw)) {
      const count = Math.max(MIN_NODES, Math.min(MAX_NODES, raw));
      if (count !== N) buildGraph(count);
    }
    rebuildEdges();
    scheduleHashUpdate();
    startApprox();
  });

  // ---- Dragging via pointer events (mouse + touch) ----
  let dragIndex = -1;
  let offsetX = 0, offsetY = 0;

  function svgPoint(evt) {
    const rect = svg.getBoundingClientRect();
    return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
  }

  svg.addEventListener('pointerdown', (evt) => {
    const g = evt.target.closest('.node');
    if (!g) return;
    dragIndex = +g.dataset.index;
    const p = svgPoint(evt);
    offsetX = nodes[dragIndex].x - p.x;
    offsetY = nodes[dragIndex].y - p.y;
    g.classList.add('dragging');
    nodesLayer.appendChild(g); // raise to top
    svg.setPointerCapture(evt.pointerId);
    evt.preventDefault();
  });

  svg.addEventListener('pointermove', (evt) => {
    if (dragIndex < 0) return;
    const p = svgPoint(evt);
    nodes[dragIndex].x = p.x + offsetX;
    nodes[dragIndex].y = p.y + offsetY;
    updateNode(dragIndex);
    updateEdgesFor(dragIndex);
  });

  function endDrag() {
    if (dragIndex < 0) return;
    nodes[dragIndex].g.classList.remove('dragging');
    dragIndex = -1;
    saveState();
    scheduleHashUpdate();
  }
  svg.addEventListener('pointerup', endDrag);
  svg.addEventListener('pointercancel', endDrag);
})();
</script>
</body>
</html>
